<!DOCTYPE html>
<html>
<head>

<title>Feedback List</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

.navbar{
background:#5a67d8;
padding:15px;
text-align:center;
}

.navbar a{
color:white;
text-decoration:none;
margin:0 15px;
font-weight:bold;
}

h2{
text-align:center;
margin-top:30px;
}

.count{
text-align:center;
color:#444;
margin-bottom:20px;
}

.card{
background:white;
width:500px;
margin:15px auto;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.name{
font-weight:bold;
font-size:18px;
color:#5a67d8;
}

.email{
font-size:14px;
color:#666;
margin-bottom:10px;
}

.message{
margin-bottom:10px;
}

.delete-btn{
background:red;
color:white;
border:none;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
}

.delete-btn:hover{
background:#b30000;
}

</style>

</head>

<body>

<div class="navbar">

<a href="/">Home</a>

<a href="/feedback/">Add Feedback</a>

<a href="/about/">About</a>

<a href="/contact/">Contact</a>

</div>

<h2>Submitted Feedback</h2>

<p class="count">Total Feedbacks: <b>{{ count }}</b></p>

{% for f in feedbacks %}

<div class="card">

<div class="name">{{ f.name }}</div>

<div class="email">{{ f.email }}</div>

<div class="message">{{ f.message }}</div>

<a href="/delete/{{ f.id }}">
<button class="delete-btn">Delete</button>
</a>

</div>

{% endfor %}

</body>
</html>
