<!DOCTYPE html>
<html>
<head>
<title>Submit Feedback</title>

<style>

body{
font-family:Arial;
background:#eef2ff;
margin:0;
}

.navbar{
background:#5a67d8;
padding:15px;
text-align:center;
}

.navbar a{
color:white;
text-decoration:none;
margin:0 15px;
font-weight:bold;
}

.container{
width:420px;
margin:60px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

h2{
text-align:center;
color:#333;
}

button{
width:100%;
padding:12px;
background:#5a67d8;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#434190;
}

.success{
color:green;
text-align:center;
}

</style>

</head>

<body>

<div class="navbar">

<a href="/">Home</a>

<a href="/list/">View Feedback</a>

<a href="/about/">About</a>

<a href="/contact/">Contact</a>

</div>

<div class="container">

<h2>Submit Your Feedback</h2>

{% if messages %}
{% for message in messages %}
<p class="success">{{ message }}</p>
{% endfor %}
{% endif %}

<form method="post">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">Submit Feedback</button>

</form>

</div>

</body>
</html>
